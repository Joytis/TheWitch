<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Witch Card Designs</title>
<style>
  :root{
    --bg:#15131c; --panel:#1f1b2b; --panel2:#272234; --line:#3a3350;
    --ink:#e9e4f5; --muted:#a99fc4; --gold:#e0b24a; --accent:#9d7bff;
    --ok:#46c476; --no:#5b5470;
    --starter:#7d8590; --common:#9fb1c9; --uncommon:#5f9bd6; --rare:#d6a23a; --special:#c46be0; --ancient:#e0734a; --token:#7c6f96;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 "Segoe UI",system-ui,sans-serif}
  header{padding:18px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
  h1{margin:0 0 4px;font-size:20px;color:var(--gold);letter-spacing:.5px}
  .sub{color:var(--muted);font-size:12px}
  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:7px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;user-select:none}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  input[type=search]{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:7px 10px;border-radius:6px;min-width:220px;font-size:13px}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 11px;border-radius:14px;cursor:pointer;font-size:12px;user-select:none}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .prog{margin-left:auto;color:var(--muted);font-size:12px;text-align:right}
  .bar{width:160px;height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:4px}
  .bar > i{display:block;height:100%;background:var(--ok);width:0}
  main{padding:14px 22px 60px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{position:sticky;top:152px;background:var(--panel);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;z-index:3;cursor:pointer}
  tbody tr:hover{background:var(--panel2)}
  .namecell{max-width:100px}
  .name{font-weight:600}
  .entry{color:var(--muted);font:11px/1.4 ui-monospace,Consolas,monospace}
  .meta{color:var(--muted);font-size:12px;white-space:nowrap}
  .rar{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
  .text{max-width:340px}
  .nums{font:11px/1.5 ui-monospace,Consolas,monospace;color:var(--gold)}
  .up{font-size:12px;color:var(--muted)}
  .copy{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:5px 9px;cursor:pointer;font:11px ui-monospace,Consolas,monospace;white-space:nowrap}
  .copy:hover{border-color:var(--accent)}
  .copy.done{border-color:var(--ok);color:var(--ok)}
  .chip.btn{cursor:pointer}
  .thumb{width:54px}
  .thumb img{width:48px;height:auto;border-radius:4px;border:1px solid var(--line);background:#0d0b14;display:block;cursor:zoom-in}
  .thumb img.noart{opacity:.35;filter:grayscale(.6)}
  .artcell{white-space:nowrap}
  .artbadge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .art-none{background:#5b547033;color:#9b93b3}
  .art-placeholder{background:#c98a2a33;color:#e0b24a}
  .art-final{background:#46c47633;color:#5fe09a}
  .afinal{margin-left:6px;cursor:pointer;background:none;border:1px solid var(--line);border-radius:5px;color:var(--muted);font-size:11px;padding:2px 6px}
  .afinal:hover:not(:disabled){border-color:var(--ok);color:var(--ok)}
  .afinal:disabled{opacity:.3;cursor:not-allowed}
  .afinal.on{border-color:var(--ok);color:var(--ok)}
  .tcell{text-align:center;white-space:nowrap}
  .bfield{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:5px 8px;font:12px "Segoe UI",system-ui,sans-serif}
  .bfield:focus{outline:none;border-color:var(--accent)}
  .bfield.saved{border-color:var(--ok)}
  input.aartist{width:90px}
  textarea.abrief{width:620px;min-height:80px;resize:vertical;line-height:1.35}
  .tog{cursor:pointer;font-size:18px;background:none;border:none;color:var(--no)}
  .tog.on{color:var(--ok)}
  .badge{font-size:10px;color:var(--muted);display:block}
  .makeup{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:11px;font-size:12px;color:var(--muted)}
  .makeup .grp{display:flex;gap:8px;align-items:baseline}
  .makeup .glab{color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px}
  .makeup b{color:var(--ink);font-weight:600}
  .makeup .z{opacity:.45}
  /* mechanic + role tag pills (colors shared across classes; one class shown at a time) */
  .tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin:1px 2px 1px 0;white-space:nowrap}
  .m-Brambles,.m-Poison{background:#3a6b3a33;color:#7fd17f}
  .m-Potions,.m-Soul{background:#3a5a7b33;color:#74b6e6}
  .m-Familiars,.m-Osty{background:#7b4a8a33;color:#d28fe6}
  .m-Debuff\/Buff{background:#8a2a3a33;color:#ff8fa8}
  .m-Status{background:#4a4a2a33;color:#c6c67f}
  .m-Colorless{background:#55555533;color:#cfcfcf}
  .m-Shivs{background:#5a5f6b33;color:#b9c4d6}
  .m-Discard{background:#7b5a2a33;color:#e0b24a}
  .m-Doom{background:#7b2a4a33;color:#e68fa8}
  .m-Strength{background:#7b3a2a33;color:#e69a74}
  .m-Exhaust{background:#5a3a6b33;color:#c08fe6}
  .m-Self-Harm{background:#6b2a2a33;color:#e67f7f}
  .m-Vulnerable{background:#6b5a2a33;color:#d6c074}
  .m-Ethereal{background:#2a5a6b33;color:#74c6d6}
  .m-Orbs{background:#2a4a7b33;color:#7c9fe6}
  .m-Focus{background:#5a2a7b33;color:#b58fe6}
  .m-Stars{background:#6b5a2a33;color:#e6cf74}
  .m-Forge{background:#7b3a2a33;color:#e69074}
  .m-Vigor{background:#2a6b4a33;color:#74e6a8}
  .m-None{background:#5b547033;color:#9b93b3}
  .r-Generator{background:#2f6b5a33;color:#5fe0b8}
  .r-Payoff{background:#7b5a2a33;color:#e0b24a}
  .r-Enabler{background:#5a4a8a33;color:#a99fff}
  .r-Token{background:#6b3a5a33;color:#e68fc0}
  .r-Standalone{background:#5b547033;color:#9b93b3}
  .matrix{margin-top:12px;border-collapse:collapse;font-size:12px}
  .matrix th,.matrix td{border:1px solid var(--line);padding:4px 10px;text-align:center;position:static;background:none;text-transform:none;letter-spacing:0}
  .matrix th{color:var(--accent);font-weight:600}
  .matrix td.lab{color:var(--muted);text-align:left;font-weight:600}
  .matrix td b{color:var(--ink)}
  .matrix td.z{opacity:.3}
  .matrix tr.hole td{color:#ff9b9b}
  details.mwrap{margin-top:10px}
  details.mwrap summary{cursor:pointer;color:var(--accent);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .offline{display:none;background:#5b2330;color:#ffd9df;padding:8px 22px;font-size:12px}
  body.nosrv.devmode .offline{display:block}
</style>
</head>
<body>
<header>
  <div class="tabs" id="tabs"></div>
  <h1 id="title">Witch Card Designs</h1>
  <div class="sub" id="subline"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="search name / text / entry…" />
    <span id="rarities"></span>
    <span id="mechanics"></span>
    <span id="roles"></span>
    <span class="chip onlyDev" data-t="untested">untested only</span>
    <span class="chip onlyDev" data-t="noart">no-art only</span>
    <button class="chip btn onlyDev" id="exportUnfinished" title="Copy png filename + name, type/rarity, and description for every card whose big art is still a card.png duplicate — art direction reference">⧉ export no-art names</button>
    <div class="prog">
      <span id="count"></span>
      <div class="bar onlyDev"><i id="barfill"></i></div>
    </div>
  </div>
  <div class="makeup" id="makeup"></div>
  <details class="mwrap"><summary>Mechanic × Role matrix</summary><div id="matrix"></div></details>
  <details class="mwrap"><summary>Rarity × Type matrix</summary><div id="rtmatrix"></div></details>
</header>
<div class="offline">⚠ Loaded without the local server — copy buttons work, but TESTED toggles will <b>not</b> save. Run <code>node Docs/card-data/server.js</code> and open <code>http://localhost:7820</code>.</div>
<main>
  <table>
    <thead><tr id="head"></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</main>
<script>
const RAR_ORDER = ["Starter","Common","Uncommon","Rare","Special","Ancient","Token"];
const RAR_COLOR = {Starter:"--starter",Common:"--common",Uncommon:"--uncommon",Rare:"--rare",Special:"--special",Ancient:"--ancient",Token:"--token"};
const ART_RANK = { none:0, placeholder:1, final:2 };
const ROLES = ["Generator","Payoff","Enabler","Token","Standalone"];

// Per-tab config. `dev` = the mod's own cards (cards.json) with art/tested tooling + server writes.
// `ref` = read-only base-game reference pulled from decompiled source.
const CLASSES = {
  witch:      { label:"Witch",      file:"cards.json",       mode:"dev", mechanics:["Brambles","Potions","Familiars","Debuff/Buff","None"], note:"Living design doc — toggle TESTED only after verifying a card in-game." },
  silent:      { label:"Silent",      file:"silent.json",      mode:"ref", mechanics:["Poison","Shivs","Discard","None"],       note:"Base-game reference (decompiled). Pillars: Poison · Shivs · Discard." },
  necrobinder: { label:"Necrobinder", file:"necrobinder.json", mode:"ref", mechanics:["Osty","Soul","Doom","Ethereal","None"], note:"Base-game reference (decompiled). Pillars: Osty (summons) · Soul · Doom · Ethereal." },
  ironclad:    { label:"Ironclad",    file:"ironclad.json",    mode:"ref", mechanics:["Strength","Exhaust","Self-Harm","Vulnerable","None"], note:"Base-game reference (decompiled). Pillars: Strength · Exhaust · Self-Harm · Vulnerable." },
  defect:      { label:"Defect",      file:"defect.json",      mode:"ref", mechanics:["Orbs","Focus","Status","None"],              note:"Base-game reference (decompiled). Pillars: Orbs (Channel/Evoke) · Focus (amplifier) · Status (self-inflict + convert)." },
  regent:      { label:"Regent",      file:"regent.json",      mode:"ref", mechanics:["Stars","Forge","Colorless","Vigor","None"], note:"Base-game reference (decompiled). Pillars: Stars · Forge (incl. Sovereign Blade cards) · Colorless (Vigor is vestigial, 2 cards)." },
};

let CARDS = [];
let BRIEFS = {};
let CLS = "witch";
let MECH = CLASSES.witch.mechanics;
let MODE = "dev";
let SERVER = false;
let imgver = 0;
const state = { q:"", rar:new Set(), mech:new Set(), role:new Set(), untested:false, noart:false, sort:"rarity", dir:1 };

function buildTabs(){
  const host = document.getElementById("tabs");
  host.innerHTML = "";
  Object.entries(CLASSES).forEach(([key,cfg])=>{
    const el = document.createElement("span");
    el.className = "tab"+(key===CLS?" on":""); el.textContent = cfg.label; el.dataset.cls = key;
    el.onclick = ()=> switchClass(key);
    host.appendChild(el);
  });
}

function switchClass(key){
  if(key===CLS) return;
  CLS = key;
  const cfg = CLASSES[key];
  MECH = cfg.mechanics; MODE = cfg.mode;
  // reset filters
  state.q=""; state.rar.clear(); state.mech.clear(); state.role.clear(); state.untested=false; state.noart=false; state.sort="rarity"; state.dir=1;
  document.getElementById("q").value="";
  document.body.classList.toggle("devmode", MODE==="dev");
  document.querySelectorAll(".onlyDev").forEach(e=> e.style.display = MODE==="dev" ? "" : "none");
  load();
  buildTabs();
}

async function load(){
  const cfg = CLASSES[CLS];
  try{
    const r = await fetch(cfg.file+"?_="+Date.now());
    const d = await r.json();
    CARDS = d.cards;
    imgver++;
    document.getElementById("title").textContent = cfg.label==="Witch" ? "Witch Card Designs" : cfg.label+" — Class Makeup";
    document.getElementById("subline").innerHTML = cfg.note + (d.generated ? ` <span class="muted">· ${d.generated}</span>` : "");
    SERVER = (location.protocol === "http:" || location.protocol === "https:");
    if(MODE==="dev" && !SERVER) document.body.classList.add("nosrv");
    if(MODE==="dev" && SERVER){
      try{ BRIEFS = (await (await fetch("/briefs.json?_="+Date.now())).json()).briefs || {}; }
      catch(e){ BRIEFS = {}; }
    }
    buildHead();
    buildRarityChips();
    buildTagChips();
    renderMakeup();
    renderMatrix();
    renderRarityTypeMatrix();
    render();
  }catch(e){
    document.getElementById("rows").innerHTML =
      `<tr><td colspan="12" style="color:#ffb3b3">Could not load ${cfg.file}. ${MODE==="dev"?"Start the server: <code>node Docs/card-data/server.js</code>":"Run the generator to produce it."}</td></tr>`;
  }
}

function buildHead(){
  const dev = MODE==="dev";
  const cols = [];
  if(dev) cols.push(`<th>Art</th>`);
  cols.push(`<th data-k="name">Card</th>`,`<th data-k="cost">Cost</th>`,`<th data-k="type">Type</th>`,`<th data-k="rarity">Rarity</th>`,`<th>Category</th>`,`<th>Text</th>`,`<th>Numbers</th>`,`<th>Upgrade</th>`);
  if(dev) cols.push(`<th>Artist</th>`,`<th>Art Brief</th>`,`<th>Add</th>`,`<th data-k="art">Art State</th>`,`<th data-k="tested">Tested</th>`);
  document.getElementById("head").innerHTML = cols.join("");
  document.querySelectorAll("th[data-k]").forEach(th=>{
    th.onclick=()=>{ const k=th.dataset.k; state.dir = (state.sort===k)? -state.dir : 1; state.sort=k; render(); };
  });
}

function buildRarityChips(){
  const present = RAR_ORDER.filter(r => CARDS.some(c => c.rarity===r));
  const extra = [...new Set(CARDS.map(c=>c.rarity))].filter(r=>!RAR_ORDER.includes(r));
  const host = document.getElementById("rarities"); host.innerHTML="";
  [...present,...extra].forEach(r=>{
    const el = document.createElement("span");
    el.className="chip"; el.textContent=r; el.dataset.rar=r;
    el.onclick=()=>{ el.classList.toggle("on"); state.rar.has(r)?state.rar.delete(r):state.rar.add(r); render(); };
    host.appendChild(el);
  });
}

function buildTagChips(){
  const mk = (host, vals, set, cls) => {
    host.innerHTML="";
    vals.forEach(v=>{
      const el=document.createElement("span");
      el.className="chip "+cls+v; el.textContent=v; el.dataset.val=v;
      el.onclick=()=>{ el.classList.toggle("on"); set.has(v)?set.delete(v):set.add(v); render(); };
      host.appendChild(el);
    });
  };
  // only show role values actually present (Token only appears for Witch)
  const rolesPresent = ROLES.filter(r => CARDS.some(c => (c.role||[]).includes(r)));
  mk(document.getElementById("mechanics"), MECH, state.mech, "m-");
  mk(document.getElementById("roles"), rolesPresent, state.role, "r-");
}

function renderMatrix(){
  // Familiar payloads (Token rarity) aren't draftable cards — exclude from the makeup matrix.
  const MAT = CARDS.filter(c=>c.rarity!=="Token");
  const roles = ROLES.filter(r => MAT.some(c => (c.role||[]).includes(r)));
  const grid = {}; MECH.forEach(m=>{ grid[m]={}; roles.forEach(r=>grid[m][r]=0); });
  const mTot = {}, rTot = {};
  MAT.forEach(c=>{
    (c.mechanics||["None"]).forEach(m=>{
      mTot[m]=(mTot[m]||0)+1;
      (c.role||["Standalone"]).forEach(r=>{ if(grid[m]&&r in grid[m]) grid[m][r]++; });
    });
    (c.role||["Standalone"]).forEach(r=>{ rTot[r]=(rTot[r]||0)+1; });
  });
  const head = `<tr><th>↓mech \\ role→</th>${roles.map(r=>`<th>${r}</th>`).join("")}<th>Σ</th></tr>`;
  const body = MECH.map(m=>{
    const hole = m!=="None" && (grid[m].Payoff||0)===0;
    const cells = roles.map(r=>{ const n=grid[m][r]; return `<td class="${n?'':'z'}"><b>${n||0}</b></td>`; }).join("");
    return `<tr class="${hole?'hole':''}"><td class="lab m-${m}" style="background:none">${m}</td>${cells}<td><b>${mTot[m]||0}</b></td></tr>`;
  }).join("");
  const foot = `<tr><td class="lab">Σ</td>${roles.map(r=>`<td><b>${rTot[r]||0}</b></td>`).join("")}<td></td></tr>`;
  document.getElementById("matrix").innerHTML =
    `<table class="matrix"><thead>${head}</thead><tbody>${body}${foot}</tbody></table>` +
    `<div class="sub" style="margin-top:6px">Cards with multiple tags count in each cell they span, so rows/columns may exceed the card total. Familiar token payloads (Token rarity) are excluded. Red row = core mechanic with no Payoff.</div>`;
}

function renderRarityTypeMatrix(){
  // Familiar payloads (Token rarity) aren't draftable cards — exclude, same as the mechanic matrix.
  const MAT = CARDS.filter(c=>c.rarity!=="Token");
  const TYPE_ORDER = ["Attack","Skill","Power","Potion","Status","Curse"];
  const types = [...new Set([...TYPE_ORDER, ...MAT.map(c=>c.type)])].filter(t => MAT.some(c=>c.type===t));
  const rars = [...new Set([...RAR_ORDER, ...MAT.map(c=>c.rarity)])].filter(r => r!=="Token" && MAT.some(c=>c.rarity===r));
  const grid = {}, rTot = {}, tTot = {};
  rars.forEach(r=>{ grid[r]={}; types.forEach(t=>grid[r][t]=0); });
  MAT.forEach(c=>{
    if(grid[c.rarity] && c.type in grid[c.rarity]) grid[c.rarity][c.type]++;
    rTot[c.rarity]=(rTot[c.rarity]||0)+1;
    tTot[c.type]=(tTot[c.type]||0)+1;
  });
  const head = `<tr><th>↓rarity \\ type→</th>${types.map(t=>`<th>${t}</th>`).join("")}<th>Σ</th></tr>`;
  const body = rars.map(r=>{
    const cells = types.map(t=>{ const n=grid[r][t]; return `<td class="${n?'':'z'}"><b>${n||0}</b></td>`; }).join("");
    return `<tr><td class="lab" style="color:var(${RAR_COLOR[r]||'--muted'})">${r}</td>${cells}<td><b>${rTot[r]||0}</b></td></tr>`;
  }).join("");
  const foot = `<tr><td class="lab">Σ</td>${types.map(t=>{
    const n = tTot[t]||0, pct = MAT.length ? Math.round(n*100/MAT.length) : 0;
    return `<td><b>${n}</b> <span class="z">${pct}%</span></td>`;
  }).join("")}<td><b>${MAT.length}</b></td></tr>`;
  document.getElementById("rtmatrix").innerHTML =
    `<table class="matrix"><thead>${head}</thead><tbody>${body}${foot}</tbody></table>` +
    `<div class="sub" style="margin-top:6px">Familiar token payloads (Token rarity) are excluded. Σ row shows each type's share of the draftable pool.</div>`;
}

function renderMakeup(){
  // Token-rarity cards (familiar payloads) aren't part of the draftable pool — count them separately.
  const byRar = {}, byTypeCore = {}, byTypeTok = {};
  CARDS.forEach(c=>{
    byRar[c.rarity]=(byRar[c.rarity]||0)+1;
    const bucket = c.rarity==="Token" ? byTypeTok : byTypeCore;
    bucket[c.type]=(bucket[c.type]||0)+1;
  });
  const rarWanted = RAR_ORDER;
  const typeWanted = ["Attack","Skill","Power","Potion"];
  const rars = [...new Set([...rarWanted, ...Object.keys(byRar)])].filter(r => byRar[r]);
  const typesOf = (m) => [...new Set([...typeWanted, ...Object.keys(m)])].filter(t => m[t]);
  const cell = (lab,n) => `<span class="${n?'':'z'}">${lab} <b>${n||0}</b></span>`;
  const tokenCount = byRar["Token"] || 0;
  const totalCells = tokenCount
    ? `${cell('core', CARDS.length - tokenCount)}${cell('+ tokens', tokenCount)}`
    : cell('cards', CARDS.length);
  const coreTypes = typesOf(byTypeCore);
  let html =
    `<span class="grp"><span class="glab">Total</span>${totalCells}</span>` +
    `<span class="grp"><span class="glab">Rarity</span>${rars.map(r=>cell(r,byRar[r])).join("")}</span>` +
    `<span class="grp"><span class="glab">${tokenCount?'Type (core)':'Type'}</span>${coreTypes.map(t=>cell(t,byTypeCore[t])).join("")}</span>`;
  if(tokenCount)
    html += `<span class="grp"><span class="glab">Token Type</span>${typesOf(byTypeTok).map(t=>cell(t,byTypeTok[t])).join("")}</span>`;
  if(MODE==="dev"){
    const byArt = { none:0, placeholder:0, final:0 };
    CARDS.forEach(c=>{ byArt[c.art||"none"] = (byArt[c.art||"none"]||0)+1; });
    html += `<span class="grp"><span class="glab">Big Art</span>${cell('No Art',byArt.none)}${cell('Placeholder',byArt.placeholder)}${cell('Final',byArt.final)}</span>`;
  }
  document.getElementById("makeup").innerHTML = html;
}

function visible(){
  const q = state.q.toLowerCase();
  let list = CARDS.filter(c=>{
    if(MODE==="dev" && state.untested && c.tested) return false;
    if(MODE==="dev" && state.noart && (c.art||"none")!=="none") return false;
    if(state.rar.size && !state.rar.has(c.rarity)) return false;
    if(state.mech.size && !(c.mechanics||["None"]).some(m=>state.mech.has(m))) return false;
    if(state.role.size && !(c.role||["Standalone"]).some(r=>state.role.has(r))) return false;
    if(q){
      const hay = (c.name+" "+c.entry+" "+c.text+" "+(c.note||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const rk = c => { const i=RAR_ORDER.indexOf(c.rarity); return i<0?99:i; };
  list.sort((a,b)=>{
    let r=0;
    if(state.sort==="rarity") r = rk(a)-rk(b) || a.name.localeCompare(b.name);
    else if(state.sort==="cost") r = (parseInt(a.cost)||0)-(parseInt(b.cost)||0) || a.name.localeCompare(b.name);
    else if(state.sort==="type") r = String(a.type).localeCompare(String(b.type)) || a.name.localeCompare(b.name);
    else if(state.sort==="tested") r = (a.tested?1:0)-(b.tested?1:0) || a.name.localeCompare(b.name);
    else if(state.sort==="art") r = (ART_RANK[a.art||"none"]-ART_RANK[b.art||"none"]) || a.name.localeCompare(b.name);
    else r = String(a[state.sort]).localeCompare(String(b[state.sort]));
    return r*state.dir;
  });
  return list;
}

function numsHtml(n){
  const ks = Object.keys(n||{});
  if(!ks.length) return '<span class="up">—</span>';
  return ks.map(k=>`${k} ${n[k]}`).join("<br>");
}

function catHtml(c){
  return (c.mechanics||["None"]).map(m=>`<span class="tag m-${esc(m)}">${esc(m)}</span>`).join("")
    + "<br>" + (c.role||["Standalone"]).map(r=>`<span class="tag r-${esc(r)}">${esc(r)}</span>`).join("");
}

function render(){
  const tb = document.getElementById("rows");
  const list = visible();
  const dev = MODE==="dev";
  tb.innerHTML = "";
  list.forEach(c=>{
    const tr = document.createElement("tr");
    const color = `var(${RAR_COLOR[c.rarity]||"--muted"})`;
    let html = "";
    if(dev){
      const art = c.art || "none";
      const isNone = art === "none";
      const artLabel = {none:"No Art", placeholder:"Placeholder", final:"Final"}[art];
      html += `<td class="thumb"><img loading="lazy" src="art/${esc(c.entry)}.png?v=${imgver}" class="${isNone?"noart":""}" alt="" title="${esc(c.entry.toLowerCase())}.png — click to open"></td>`;
      const bf = BRIEFS[c.name] || {};
      var devTail = `
        <td><input class="bfield aartist" data-name="${esc(c.name)}" value="${esc(bf.artist||"")}" placeholder="—" title="Artist working on this card (saved on change)"></td>
        <td><textarea class="bfield abrief" data-name="${esc(c.name)}" rows="4" placeholder="notes for the artist…" title="Art brief (saved on change)">${esc(bf.brief||"")}</textarea></td>
        <td><button class="copy" data-cmd="card THEWITCH-${esc(c.entry)}" title="copy console command">card THEWITCH-${esc(c.entry)}</button></td>
        <td class="artcell">
          <span class="artbadge art-${art}">${artLabel}</span>
          <button class="afinal ${art==="final"?"on":""}" data-entry="${esc(c.entry)}" ${isNone?"disabled":""}
            title="${isNone?"Add real art first (still a card.png duplicate)":(art==="final"?"Flagged Final — click to unflag":"Flag art as Final")}">${art==="final"?"★ final":"☆ final"}</button>
        </td>
        <td class="tcell">
          <button class="tog ${c.tested?"on":""}" data-entry="${esc(c.entry)}" title="${c.tested?"Tested — click to clear":"Not tested — click to mark tested"}">${c.tested?"✅":"❌"}</button>
        </td>`;
    } else { var devTail = ""; }
    html += `
      <td class="namecell">
        <span class="name">${esc(c.name)}</span>
        <span class="entry">${esc(c.entry)}</span>
      </td>
      <td class="meta">${esc(String(c.cost))}</td>
      <td class="meta">${esc(c.type)}<br><span class="badge">${esc(c.target)}</span></td>
      <td><span class="rar" style="background:${color}33;color:${color}">${esc(c.rarity)}</span></td>
      <td>${catHtml(c)}</td>
      <td class="text">${esc(c.text)}</td>
      <td class="nums">${numsHtml(c.numbers)}</td>
      <td class="up">${esc(c.upgrade||"none")}</td>` + devTail;
    tr.innerHTML = html;
    tb.appendChild(tr);
  });
  if(dev){
    // Tested progress tracks the core (draftable) pool; Token-rarity familiar payloads are noted separately.
    const core = CARDS.filter(c=>c.rarity!=="Token");
    const tokenN = CARDS.length - core.length;
    const tested = core.filter(c=>c.tested).length;
    document.getElementById("count").textContent =
      `${tested}/${core.length} core tested${tokenN?` (+${tokenN} tokens)`:""} · showing ${list.length}`;
    document.getElementById("barfill").style.width = (core.length? (tested/core.length*100):0)+"%";
  } else {
    document.getElementById("count").textContent = `${CARDS.length} cards · showing ${list.length}`;
  }
}

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); return true; }
  catch(e){
    const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    let ok=false; try{ ok=document.execCommand("copy"); }catch(_){}
    document.body.removeChild(ta); return ok;
  }
}

document.addEventListener("click", async (e)=>{
  const cp = e.target.closest(".copy");
  if(cp){
    const ok = await copyText(cp.dataset.cmd);
    const old = cp.textContent;
    cp.classList.add("done"); cp.textContent = ok?"copied!":"copy failed";
    setTimeout(()=>{ cp.classList.remove("done"); cp.textContent=old; }, 900);
    return;
  }
  if(MODE==="dev"){
    const tg = e.target.closest(".tog");
    if(tg){
      const entry = tg.dataset.entry;
      const card = CARDS.find(c=>c.entry===entry);
      const next = !card.tested;
      card.tested = next;
      render();
      if(SERVER){
        try{
          const r = await fetch("/api/tested",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({entry,tested:next})});
          if(!r.ok) throw new Error(await r.text());
        }catch(err){
          card.tested = !next; render();
          document.body.classList.add("nosrv");
          alert("Could not save TESTED change — is the server running?\n"+err);
        }
      } else { document.body.classList.add("nosrv"); }
      return;
    }
    const af = e.target.closest(".afinal");
    if(af && !af.disabled){
      const entry = af.dataset.entry;
      const card = CARDS.find(c=>c.entry===entry);
      const next = !card.artFinal;
      card.artFinal = next;
      card.art = next ? "final" : "placeholder";
      render(); renderMakeup();
      if(SERVER){
        try{
          const r = await fetch("/api/artfinal",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({entry,artFinal:next})});
          if(!r.ok) throw new Error(await r.text());
          const j = await r.json();
          card.art = j.art; render(); renderMakeup();
        }catch(err){
          card.artFinal = !next; card.art = next ? "placeholder" : "final"; render(); renderMakeup();
          document.body.classList.add("nosrv");
          alert("Could not save Art-Final change — is the server running?\n"+err);
        }
      } else { document.body.classList.add("nosrv"); }
      return;
    }
    if(e.target.closest("#exportUnfinished")){
      const rows = CARDS.filter(c=>(c.art||"none")==="none")
        .sort((a,b)=>a.entry.localeCompare(b.entry))
        .map(c=>{
          const desc = (c.text||"").replace(/\s*\n\s*/g," ").trim();
          return `${c.entry.toLowerCase()}.png — ${c.name} (${c.type}, ${c.rarity})${desc?` — ${desc}`:""}`;
        });
      const ok = await copyText(rows.join("\n"));
      const btn = document.getElementById("exportUnfinished");
      const old = btn.textContent;
      btn.textContent = ok ? `copied ${rows.length} cards!` : "copy failed";
      setTimeout(()=>{ btn.textContent = old; }, 1200);
      return;
    }
  }
  const img = e.target.closest(".thumb img");
  if(img){ window.open(img.src, "_blank"); return; }
  const untested = e.target.closest('[data-t="untested"]');
  if(untested){ untested.classList.toggle("on"); state.untested=!state.untested; render(); }
  const noart = e.target.closest('[data-t="noart"]');
  if(noart){ noart.classList.toggle("on"); state.noart=!state.noart; render(); }
});

document.getElementById("q").addEventListener("input", e=>{ state.q=e.target.value; render(); });

// Artist / Art-Brief fields: save both values for the row whenever either changes.
document.addEventListener("change", async (e)=>{
  const f = e.target.closest(".bfield");
  if(!f || MODE!=="dev") return;
  const name = f.dataset.name;
  const tr = f.closest("tr");
  const artist = (tr.querySelector(".aartist")?.value || "").trim();
  const brief = (tr.querySelector(".abrief")?.value || "").trim();
  if(artist || brief) BRIEFS[name] = { artist, brief }; else delete BRIEFS[name];
  if(SERVER){
    try{
      const r = await fetch("/api/brief",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,artist,brief})});
      if(!r.ok) throw new Error(await r.text());
      f.classList.add("saved"); setTimeout(()=>f.classList.remove("saved"), 800);
    }catch(err){
      document.body.classList.add("nosrv");
      alert("Could not save Artist/Brief change — is the server running?\n"+err);
    }
  } else { document.body.classList.add("nosrv"); }
});

document.body.classList.add("devmode");
buildTabs();
load();
</script>
</body>
</html>
